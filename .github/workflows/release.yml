name: Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ffmpeg-api

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v5
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install FFmpeg
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        working-directory: ./src
        run: npm ci

      - name: Run tests
        if: ${{ steps.release.outputs.release_created == 'true' }}
        working-directory: ./src
        run: npm test

      - name: Lint OpenAPI
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npx @redocly/cli lint docs/openapi.yaml

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GHCR metadata
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
            type=raw,value=${{ steps.release.outputs.major }}
            type=raw,value=latest

      - name: Build and push image to GHCR
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}

      - name: Check Docker Hub configuration
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: dockerhub_config
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_NAMESPACE" ] && [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ steps.release.outputs.release_created == 'true' && steps.dockerhub_config.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: ${{ steps.release.outputs.release_created == 'true' && steps.dockerhub_config.outputs.enabled == 'true' }}
        id: meta_dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
            type=raw,value=${{ steps.release.outputs.major }}
            type=raw,value=latest

      - name: Build and push image to Docker Hub
        if: ${{ steps.release.outputs.release_created == 'true' && steps.dockerhub_config.outputs.enabled == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_dockerhub.outputs.labels }}
