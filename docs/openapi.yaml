openapi: 3.1.0
info:
  title: ffmpeg-api
  version: 1.2.0
  summary: Async-first media processing API powered by FFmpeg
  description: >
    Draft OpenAPI contract for the next version of ffmpeg-api. This
    specification is intended to be the source of truth for Scalar
    documentation.
  license:
    name: ISC
    identifier: ISC
servers:
  - url: https://api.ffmpeg-api.dev
    description: Draft public base URL for production deployments.
tags:
  - name: Jobs
    description: Create, inspect, cancel, and download processing jobs.
  - name: Chunks
    description: Split audio or video into multiple chunks and return a ZIP artifact.
  - name: Analysis
    description: Analyze audio files using lightweight FFmpeg-based heuristics.
  - name: Capabilities
    description: >-
      Discover the real FFmpeg and FFprobe capabilities available in the current
      deployment.
  - name: Health
    description: Basic service health and readiness checks.
security: []
paths:
  /v1/jobs/url:
    post:
      tags:
        - Jobs
      operationId: createJobFromUrl
      summary: Create a media processing job from a remote URL
      description: |
        Creates a processing job from a remote URL using application/json.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UrlJobCreateRequest'
            examples:
              oggFromUrl:
                summary: Speed up and trim silence from an OGG file
                value:
                  input:
                    type: url
                    url: https://cdn.example.com/audio/episode.ogg
                  analysis:
                    audioActivity: true
                  recipe:
                    output:
                      container: ogg
                      filename: episode-fast.ogg
                    operations:
                      - type: silence_trim
                        startThreshold: '-40dB'
                        startDuration: 0.3
                        stopThreshold: '-40dB'
                        stopDuration: 0.5
                      - type: speed
                        factor: 1.25
      responses:
        '200':
          description: Output generated synchronously
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Input too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Queue is full
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/jobs/upload:
    post:
      tags:
        - Jobs
      operationId: createJobFromUpload
      summary: Create a media processing job from an uploaded file
      description: |
        Creates a processing job from a multipart file upload.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadJobCreateRequest'
            examples:
              uploadJob:
                summary: Upload a file and process it
                value:
                  file: (binary)
                  mode: sync
                  analysis:
                    audioActivity: true
                  recipe:
                    output:
                      container: ogg
                      filename: upload-output.ogg
                    operations:
                      - type: speed
                        factor: 1.2
            encoding:
              recipe:
                contentType: application/json
              analysis:
                contentType: application/json
      responses:
        '200':
          description: Output generated synchronously
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Input too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Queue is full
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/jobs/{jobId}:
    get:
      tags:
        - Jobs
      operationId: getJob
      summary: Get job status
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/jobs/{jobId}/cancel:
    post:
      tags:
        - Jobs
      operationId: cancelJob
      summary: Cancel a queued or running job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Cancel request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Job can no longer be canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/jobs/{jobId}/artifact:
    get:
      tags:
        - Jobs
      operationId: downloadJobArtifact
      summary: Download the completed job artifact
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Generated artifact
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Artifact or job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Job is not completed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/chunks/url:
    post:
      tags:
        - Chunks
      operationId: createChunkJobFromUrl
      summary: Split remote media into chunks and return a ZIP archive
      description: >
        Creates media chunks from a remote URL. Chunking strategies include
        equal parts, fixed duration, and speech-oriented silence splitting. The
        `silence` strategy prefers silence boundaries so chunks stay
        transcription-friendly, while `maxChunkDurationSeconds` prevents chunks
        from growing too large. This behavior is intended to keep transcription
        workloads manageable and avoid oversized files that may timeout in tools
        such as Whisper.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChunkUrlRequest'
            examples:
              silenceChunks:
                summary: Split speech-like segments on silence
                value:
                  mode: async
                  input:
                    type: url
                    url: https://cdn.example.com/audio/interview.ogg
                  output:
                    container: ogg
                    filenamePrefix: interview
                    archiveName: interview-chunks.zip
                  chunking:
                    strategy: silence
                    minSilenceDuration: 0.5
                    paddingBeforeSeconds: 0.2
                    paddingAfterSeconds: 0.2
                    minChunkDurationSeconds: 1
                    maxChunkDurationSeconds: 20
              equalParts:
                summary: Split a clip into equal parts
                value:
                  mode: sync
                  input:
                    type: url
                    url: https://cdn.example.com/video/trailer.mp4
                  output:
                    container: mp4
                    filenamePrefix: trailer-part
                  chunking:
                    strategy: parts
                    parts: 4
                    paddingBeforeSeconds: 0.5
                    paddingAfterSeconds: 0.5
      responses:
        '200':
          description: ZIP archive generated synchronously
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '202':
          description: Chunk job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Input too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No chunks could be produced from the input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/chunks/upload:
    post:
      tags:
        - Chunks
      operationId: createChunkJobFromUpload
      summary: Split uploaded media into chunks and return a ZIP archive
      description: >
        Creates media chunks from a multipart upload. Chunking strategies
        include equal parts, fixed duration, and speech-oriented silence
        splitting. The `silence` strategy prefers silence boundaries so chunks
        stay transcription-friendly, while `maxChunkDurationSeconds` prevents
        chunks from growing too large. This behavior is intended to keep
        transcription workloads manageable and avoid oversized files that may
        timeout in tools such as Whisper.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChunkUploadFormRequest'
            examples:
              uploadChunksByParts:
                summary: Upload a file and split it into parts
                value:
                  file: (binary)
                  mode: sync
                  container: ogg
                  filenamePrefix: part
                  archiveName: parts.zip
                  strategy: parts
                  parts: 4
                  paddingBeforeSeconds: 0.5
                  paddingAfterSeconds: 0.5
              uploadChunksBySilence:
                summary: Upload a file and split it on silence
                value:
                  file: (binary)
                  mode: async
                  container: ogg
                  filenamePrefix: segment
                  archiveName: segments.zip
                  strategy: silence
                  minSilenceDuration: 0.5
                  paddingBeforeSeconds: 0.2
                  paddingAfterSeconds: 0.2
                  minChunkDurationSeconds: 1
                  maxChunkDurationSeconds: 20
      responses:
        '200':
          description: ZIP archive generated synchronously
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '202':
          description: Chunk job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAccepted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Input too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No chunks could be produced from the input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/analyze/audio-activity/url:
    post:
      tags:
        - Analysis
      operationId: analyzeAudioActivityFromUrl
      summary: Analyze audio activity from a remote URL
      description: >
        Runs a speech-band activity heuristic using FFmpeg silence detection.
        This endpoint does not perform speech recognition. It is intended to
        detect whether a remote audio file is likely background-only or contains
        foreground activity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudioActivityUrlRequest'
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioActivityResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Input too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/analyze/audio-activity/upload:
    post:
      tags:
        - Analysis
      operationId: analyzeAudioActivityFromUpload
      summary: Analyze audio activity from an uploaded file
      description: >
        Runs a speech-band activity heuristic using FFmpeg silence detection on
        an uploaded file. This endpoint does not perform speech recognition.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AudioActivityUploadRequest'
            examples:
              uploadAnalysis:
                summary: Upload a file and analyze audio activity
                value:
                  file: (binary)
                  options:
                    minActiveRatio: 0.08
                    minSegmentDuration: 1.2
            encoding:
              options:
                contentType: application/json
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioActivityResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Input too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/capabilities:
    get:
      tags:
        - Capabilities
      operationId: getCapabilities
      summary: List runtime FFmpeg capabilities
      description: >
        Returns the real formats, codecs, filters, and tool versions available
        in the current deployment. Use this endpoint whenever you need to know
        what the running service actually supports.
      responses:
        '200':
          description: Runtime capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Capabilities'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to collect capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    UrlJobCreateRequest:
      type: object
      required:
        - input
        - recipe
      properties:
        input:
          type: object
          required:
            - type
            - url
          properties:
            type:
              type: string
              const: url
            url:
              type: string
              format: uri
        analysis:
          $ref: '#/components/schemas/JobAnalysisRequest'
        recipe:
          $ref: '#/components/schemas/TransformRecipe'
    AudioActivityUrlRequest:
      type: object
      required:
        - input
      properties:
        input:
          type: object
          required:
            - type
            - url
          properties:
            type:
              type: string
              const: url
            url:
              type: string
              format: uri
        options:
          $ref: '#/components/schemas/AudioActivityOptions'
    AudioActivityUploadRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
        options:
          description: Audio activity options sent as a JSON multipart part.
          $ref: '#/components/schemas/AudioActivityOptions'
    UploadJobCreateRequest:
      type: object
      required:
        - file
        - recipe
      properties:
        file:
          type: string
          format: binary
        mode:
          type: string
          enum:
            - auto
            - sync
            - async
        analysis:
          description: Job analysis options sent as a JSON multipart part.
          $ref: '#/components/schemas/JobAnalysisRequest'
        recipe:
          description: Transform recipe sent as a JSON multipart part.
          $ref: '#/components/schemas/TransformRecipe'
    ChunkUrlRequest:
      type: object
      required:
        - input
        - chunking
      properties:
        mode:
          type: string
          enum:
            - auto
            - sync
            - async
        input:
          type: object
          required:
            - type
            - url
          properties:
            type:
              type: string
              const: url
            url:
              type: string
              format: uri
        output:
          $ref: '#/components/schemas/ChunkOutput'
        chunking:
          description: >
            Choose how the media should be split. Use `strategy: parts` for
            equal parts, `strategy: duration` for fixed-size segments, or
            `strategy: silence` for silence-aware splitting.
          $ref: '#/components/schemas/ChunkingRequest'
    ChunkUploadFormRequest:
      type: object
      required:
        - file
        - strategy
      properties:
        file:
          type: string
          format: binary
        mode:
          type: string
          enum:
            - auto
            - sync
            - async
        container:
          type: string
          enum:
            - mp3
            - wav
            - ogg
            - mp4
            - m4a
          description: Output container for each generated chunk.
        filenamePrefix:
          type: string
          example: part
          description: Prefix used when naming each chunk inside the ZIP.
        archiveName:
          type: string
          example: parts.zip
          description: ZIP filename returned by the endpoint.
        strategy:
          type: string
          enum:
            - parts
            - duration
            - silence
          description: Selects how chunking works.
        parts:
          type: integer
          minimum: 1
          maximum: 200
          description: Required when `strategy=parts`.
        segmentDuration:
          description: Required when `chunking.strategy=duration`.
          oneOf:
            - type: number
              minimum: 0.001
            - type: string
              example: '00:00:30'
        noiseThresholdDb:
          oneOf:
            - type: number
            - type: string
              example: '-35dB'
        minSilenceDuration:
          type: number
        paddingBeforeSeconds:
          type: number
        paddingAfterSeconds:
          type: number
        minChunkDurationSeconds:
          type: number
        mergeGapSeconds:
          type: number
        maxChunkDurationSeconds:
          type: number
          description: Optional practical cap for each silence-based chunk.
        useSpeechBand:
          type: boolean
    JobAnalysisRequest:
      type: object
      properties:
        audioActivity:
          oneOf:
            - type: boolean
            - $ref: '#/components/schemas/AudioActivityOptions'
    AudioActivityOptions:
      type: object
      properties:
        noiseThresholdDb:
          type: number
          example: -35
        minSilenceDuration:
          type: number
          example: 0.5
        minSegmentDuration:
          type: number
          example: 1.2
        minActiveRatio:
          type: number
          example: 0.08
        useSpeechBand:
          type: boolean
          example: true
    TransformRecipe:
      type: object
      required:
        - output
        - operations
      properties:
        output:
          type: object
          required:
            - container
          properties:
            container:
              type: string
              example: ogg
            filename:
              type: string
              example: episode-fast.ogg
        operations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Operation'
    ChunkOutput:
      type: object
      properties:
        container:
          type: string
          enum:
            - mp3
            - wav
            - ogg
            - mp4
            - m4a
        filenamePrefix:
          type: string
          example: chunk
        archiveName:
          type: string
          example: chunks.zip
    ChunkingRequest:
      description: >
        Defines how chunking works. The `strategy` field is the selector: send
        `parts`, `duration`, or `silence`.
      discriminator:
        propertyName: strategy
        mapping:
          parts: '#/components/schemas/ChunkByParts'
          duration: '#/components/schemas/ChunkByDuration'
          silence: '#/components/schemas/ChunkBySilence'
      oneOf:
        - $ref: '#/components/schemas/ChunkByParts'
        - $ref: '#/components/schemas/ChunkByDuration'
        - $ref: '#/components/schemas/ChunkBySilence'
    ChunkByParts:
      title: Split By Parts
      description: >
        Divide the full input into a fixed number of equal parts. When padding
        is provided, the API tries to move each cut to a nearby silence within
        the allowed window.
      type: object
      required:
        - strategy
        - parts
      properties:
        strategy:
          type: string
          const: parts
          description: Use `parts` to split the input into N equal chunks.
          example: parts
        parts:
          description: Total number of equal chunks to generate.
          type: integer
          minimum: 1
          maximum: 200
        paddingBeforeSeconds:
          type: number
          description: How far before the target cut to look for silence.
        paddingAfterSeconds:
          type: number
          description: How far after the target cut to look for silence.
        noiseThresholdDb:
          oneOf:
            - type: number
            - type: string
              example: '-35dB'
        minSilenceDuration:
          type: number
          example: 0.5
        useSpeechBand:
          type: boolean
          example: true
    ChunkByDuration:
      title: Split By Duration
      description: >
        Split the input into chunks with a fixed duration. When padding is
        provided, the API tries to move each cut to a nearby silence within the
        allowed window.
      type: object
      required:
        - strategy
        - segmentDuration
      properties:
        strategy:
          type: string
          const: duration
          description: Use `duration` to create chunks every X seconds.
          example: duration
        segmentDuration:
          description: Positive number of seconds or HH:MM:SS(.mmm)
          oneOf:
            - type: number
              minimum: 0.001
            - type: string
              example: '00:00:30'
        paddingBeforeSeconds:
          type: number
          description: How far before the target cut to look for silence.
        paddingAfterSeconds:
          type: number
          description: How far after the target cut to look for silence.
        noiseThresholdDb:
          oneOf:
            - type: number
            - type: string
              example: '-35dB'
        minSilenceDuration:
          type: number
          example: 0.5
        useSpeechBand:
          type: boolean
          example: true
    ChunkBySilence:
      title: Split By Silence
      description: >
        Detect speech-like activity and create one chunk per active segment,
        using silence as the boundary.
      type: object
      required:
        - strategy
      properties:
        strategy:
          type: string
          const: silence
          description: Use `silence` to cut around active segments separated by silence.
          example: silence
        noiseThresholdDb:
          oneOf:
            - type: number
            - type: string
              example: '-35dB'
        minSilenceDuration:
          type: number
          example: 0.5
        paddingBeforeSeconds:
          type: number
          example: 0.25
        paddingAfterSeconds:
          type: number
          example: 0.25
        minChunkDurationSeconds:
          type: number
          example: 1
        maxChunkDurationSeconds:
          type: number
          example: 20
        mergeGapSeconds:
          type: number
          example: 0.15
        useSpeechBand:
          type: boolean
          example: true
    Operation:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - speed
            - silence_trim
            - trim
            - normalize
            - volume
            - channels
            - sample_rate
            - resize
            - fps
            - mute
            - extract_audio
            - watermark
      additionalProperties: true
    JobAccepted:
      type: object
      required:
        - id
        - status
        - links
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
        links:
          type: object
          properties:
            self:
              type: string
              example: /v1/jobs/07d4a4a5-55f0-4c29-8790-b7546a9b2854
            artifact:
              type: string
              example: /v1/jobs/07d4a4a5-55f0-4c29-8790-b7546a9b2854/artifact
            cancel:
              type: string
              example: /v1/jobs/07d4a4a5-55f0-4c29-8790-b7546a9b2854/cancel
    Job:
      type: object
      required:
        - id
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
            - downloading
            - processing
            - completed
            - failed
            - canceled
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        input:
          type: object
          additionalProperties: true
        recipe:
          $ref: '#/components/schemas/TransformRecipe'
        analysis:
          anyOf:
            - type: object
              properties:
                audioActivity:
                  $ref: '#/components/schemas/AudioActivityAnalysis'
            - type: 'null'
        progress:
          type: object
          properties:
            phase:
              type: string
              example: processing
            percent:
              type: number
              format: float
              minimum: 0
              maximum: 100
        artifact:
          anyOf:
            - type: object
              properties:
                filename:
                  type: string
                contentType:
                  type: string
                sizeBytes:
                  type: integer
                  format: int64
                downloadUrl:
                  type: string
                chunkCount:
                  anyOf:
                    - type: integer
                    - type: 'null'
            - type: 'null'
        metrics:
          type: object
          properties:
            queueWaitMs:
              type: integer
              format: int64
            downloadMs:
              type: integer
              format: int64
            processingMs:
              type: integer
              format: int64
            totalMs:
              type: integer
              format: int64
            inputBytes:
              type: integer
              format: int64
            outputBytes:
              type: integer
              format: int64
        error:
          $ref: '#/components/schemas/Error'
    Capabilities:
      type: object
      properties:
        ffmpegVersion:
          type: string
        ffprobeVersion:
          type: string
        formats:
          type: array
          items:
            type: string
        codecs:
          type: array
          items:
            type: string
        filters:
          type: array
          items:
            type: string
    AudioActivityResponse:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
        analysis:
          $ref: '#/components/schemas/AudioActivityAnalysis'
    AudioActivityAnalysis:
      type: object
      properties:
        analysisType:
          type: string
        warning:
          type: string
        settings:
          $ref: '#/components/schemas/AudioActivityOptions'
        durationSeconds:
          type: number
        silenceDurationSeconds:
          type: number
        activeDurationSeconds:
          type: number
        silenceRatio:
          type: number
        activeRatio:
          type: number
        longestActiveSegmentSeconds:
          type: number
        hasAudioActivity:
          type: boolean
        likelyBackgroundOnly:
          type: boolean
        likelyContainsSpeechLikeActivity:
          type: boolean
        silenceSegments:
          type: array
          items:
            $ref: '#/components/schemas/TimeSegment'
        activeSegments:
          type: array
          items:
            $ref: '#/components/schemas/TimeSegment'
    TimeSegment:
      type: object
      properties:
        start:
          type: number
        end:
          type: number
        duration:
          type: number
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: queue_full
        message:
          type: string
          example: The processing queue is full.
        details:
          anyOf:
            - type: object
              additionalProperties: true
            - type: 'null'
